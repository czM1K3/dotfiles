add_newline = true

format = """
[юВ╢](#2d3436)\
$shell\
$env_var\
$username\
$hostname\
[юВ░](bg:#3859a6 fg:#2d3436)\
$directory\
[юВ░](fg:#3859a6 bg:#05aa00)\
$git_branch\
$git_status\
[юВ░](fg:#05aa00 bg:#c4a800)\
$c\
$golang\
$java\
$dart\
$nodejs\
$rust\
[юВ░ ](fg:#c4a800)\
"""

[shell]
format = '[$indicator ](bg:#2d3436 fg:#ffffff)'
bash_indicator = "юпК"
fish_indicator = "яЬ╣"
powershell_indicator = "юпЗ"
disabled = false

[env_var.STARSHIP_DISTRO]
format = '[$env_valueтАА](bg:#2d3436 fg:#ffffff)'
variable = "STARSHIP_DISTRO"
disabled = false

[username]
show_always = false
style_user = "bg:#2d3436"
style_root = "bg:#2d3436"
format = '[$user]($style fg:#ffffff)'

[hostname]
ssh_only = true
format =  '[@$hostnameтАА](bg:#2d3436 fg:#ffffff)'

[directory]
style = "bg:#3859a6 fg:#ffffff"
read_only = "юпз"
format = "[ $read_only$path ]($style)"
truncation_length = 3
truncation_symbol = "тАж/"

[git_branch]
symbol = "яРШ"
style = "bg:#05aa00 fg:#ffffff"
format = '[тАА$symbolтАА$branchтАА]($style)'

[git_status]
style = "bg:#05aa00 fg:#ffffff"
format = '[$all_status$ahead_behindтАА]($style)'

[c]
symbol = "юШЮ "
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'

[golang]
symbol = "юШз "
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'

[java]
symbol = "юЙЦ "
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'

[dart]
symbol = "юЮШ "
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'

[nodejs]
symbol = "юЬШ"
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'

[rust]
symbol = "юЮи"
style = "bg:#c4a800 fg:#ffffff"
format = '[ $symbolтАА($version)тАА]($style)'